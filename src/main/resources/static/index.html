<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Citas</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>
    <header>
        <i class="fa fa-address-book"></i>
        <span>GESTIÓN DE CITAS</span>
    </header>

    <div id="panel">
        <button class="btn-green" onclick="mostrarFormularioInsertar()"><i class="fas fa-plus"></i> Agendar Cita</button>
        <button class="btn-blue" onclick="consultarCita()"><i class="fas fa-search"></i> Consultar Cita</button>
        <button class="btn-red" onclick="mostrarFormularioEliminar()"><i class="fas fa-trash"></i> Eliminar Cita</button>
        <button class="btn-purple" onclick="listarCitas()"><i class="fas fa-list"></i> Listar Citas</button> 
    </div>

    <div id="formularios"></div>
    
    <div id="tablaResultados">
        <div class="info-placeholder">
            <p><i class="fas fa-info-circle"></i> Seleccioná "Listar Citas" para ver la agenda actual.</p> 
        </div>       
    </div>

    <script>
    const URL_BASE = "http://localhost:8080/api/appointments";

    // Configuración base estética para SweetAlert en modo oscuro
    const swalConfig = {
        background: '#0f0b21',
        color: '#f3f0ff',
        confirmButtonColor: '#6c5ce7',
        cancelButtonColor: '#303136'
    };

    function listarCitas(){
        $.get(URL_BASE, function(data) {
            mostrarTabla(data);
        }).fail(()=>Swal.fire({...swalConfig, title: "Error", text: "No se pudieron obtener las citas", icon: "error"}));
    }

    function consultarCita() {
        Swal.fire({
            ...swalConfig,
            title: "Buscar cita por ID",
            input: "number",
            inputLabel: "Ingrese el ID de la cita",
            showCancelButton: true,
            cancelButtonText: "Cancelar",
            confirmButtonText: "Buscar",
            confirmButtonColor: "#0984e3"
        }).then(result => {
            if (result.isConfirmed && result.value) {
                $.get(URL_BASE + "/" + result.value, function (data) {
                    mostrarTabla([data]);
                }).fail(() => Swal.fire({...swalConfig, title: "Error", text: "Cita no encontrada", icon: "error"}));
            }
        });
    }

    function mostrarFormularioInsertar() {
        $("#formularios").html(`
            <h4>Insertar Nueva Cita</h4>
            <div style="text-align: center;">
                <input type="text" id="insNombre" placeholder="Nombre del cliente">
                <input type="text" id="insServicio" placeholder="Servicio">
                <input type="datetime-local" id="insFechaHora">
                <button class="btn-green" style="margin-top: 15px;" onclick="agendarCita()"><i class="fas fa-save"></i> Guardar Cita</button>
            </div>
        `);
        document.getElementById("formularios").scrollIntoView({ behavior: 'smooth' });
    }

    function agendarCita() {
        const nombre = $("#insNombre").val().trim();
        const servicio = $("#insServicio").val().trim();
        const fechaHora = $("#insFechaHora").val();

        if (!nombre || !servicio || !fechaHora) {
            return Swal.fire({
                ...swalConfig,
                title: "Campos incompletos",
                text: "Por favor, completa todos los campos (Nombre, Servicio y Fecha/Hora) antes de guardar.",
                icon: "warning",
                confirmButtonColor: "#9b59b6"
            });
        }

        const dto = {
            nombreCliente: nombre,
            servicio: servicio,
            fechaHora: fechaHora
        };

        $.ajax({
            url: URL_BASE,
            method: "POST",
            contentType: "application/json",
            data: JSON.stringify(dto),
            success: data => {
                Swal.fire({...swalConfig, title: "Éxito", text: "Cita agendada correctamente", icon: "success", confirmButtonColor: "#00b894"});
                $("#formularios").html("");
                listarCitas();
            },
            error: (xhr) => {
                const mensaje = xhr.responseJSON ? xhr.responseJSON.message : "Error desconocido";
                Swal.fire({...swalConfig, title: "Error de Validación", text: mensaje, icon: "error"});
            }
        });
    }

    function mostrarFormularioEliminar() {
        $("#formularios").html(`
            <h4>Eliminar Cita</h4>
            <div style="text-align: center;">
                <input type="number" id="delId" placeholder="ID de la cita a eliminar">
                <button class="btn-red" style="margin-top: 15px;" onclick="confirmarEliminacion()"><i class="fas fa-trash-alt"></i> Eliminar Cita</button>
            </div>
        `);
        document.getElementById("formularios").scrollIntoView({ behavior: 'smooth' });
    }

    // Nueva función intermedia para pedir confirmación con cartel previo
    function confirmarEliminacion() {
        const id = $("#delId").val().trim();
        if(!id) return Swal.fire({...swalConfig, title: "Atención", text: "Por favor ingresá un ID válido", icon: "warning"});

        Swal.fire({
            ...swalConfig,
            title: `¿Estás seguro de eliminar la cita #${id}?`,
            text: "Esta acción no se puede deshacer de la base de datos.",
            icon: "warning",
            showCancelButton: true,
            confirmButtonColor: "#d63031",
            cancelButtonColor: "#303136",
            confirmButtonText: "Sí, eliminar",
            cancelButtonText: "Cancelar"
        }).then((result) => {
            if (result.isConfirmed) {
                eliminarCita(id);
            }
        });
    }

    // Envía la petición DELETE real al backend validando existencia previa
function eliminarCita(id) {
    // 1. Primero consultamos si la cita realmente existe
    $.get(URL_BASE + "/" + id)
        .done(function() {
            // Si entra acá, significa que la cita existe. Procedemos a eliminarla.
            $.ajax({
                url: URL_BASE + "/" + id,
                method: "DELETE",
                success: msg => { 
                    const textoAlerta = (typeof msg === 'string' && msg) ? msg : "La cita ha sido eliminada con éxito.";
                    
                    Swal.fire({
                        ...swalConfig, 
                        title: "Eliminado", 
                        text: textoAlerta, 
                        icon: "success", 
                        confirmButtonColor: "#00b894"
                    });
                    $("#formularios").html("");
                    listarCitas();
                },
                error: (xhr) => {
                    const mensaje = xhr.responseJSON ? xhr.responseJSON.message : "Error al intentar eliminar la cita.";
                    Swal.fire({...swalConfig, title: "Error", text: mensaje, icon: "error"});
                }
            });
        })
        .fail(function() {
            // Si el GET falla (404), significa que la cita no existe en la base de datos
            Swal.fire({
                ...swalConfig,
                title: "No encontrada",
                text: `No existe ninguna cita registrada con el ID #${id}.`,
                icon: "error",
                confirmButtonColor: "#d63031"
            });
        });
}
    
    // Exportación nativa a CSV/Excel con codificación UTF-8 compatible y segura
    function exportarExcel() {
        const filas = document.querySelectorAll("#cuerpoTabla tr");
        
        if(filas.length === 0) {
            return Swal.fire({
                ...swalConfig, 
                title: "Sin datos", 
                text: "Primero debés listar las citas para poder exportar el reporte.", 
                icon: "warning"
            });
        }
        
        // Creamos el contenido del CSV estructurado por columnas separadas por punto y coma (;)
        let csvContent = "ID;Fecha y Hora;Nombre Cliente;Servicio\n";
        
        filas.forEach(fila => {
            const columnas = fila.querySelectorAll("td");
            if(columnas.length >= 4) {
                const id = columnas[0].textContent.trim().replace("#", "");
                const fecha = columnas[1].textContent.trim();
                const nombre = columnas[2].textContent.trim();
                const servicio = columnas[3].textContent.trim();
                
                csvContent += `${id};${fecha};${nombre};${servicio}\n`;
            }
        });
        
        // Agregamos el BOM UTF-8 (\uFEFF) para que Excel reconozca los tildes y caracteres de inmediato
        const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        
        if (navigator.msSaveBlob) { // Compatibilidad para navegadores viejos IE
            navigator.msSaveBlob(blob, "Reporte_Citas.csv");
        } else {
            const url = URL.createObjectURL(blob);
            link.href = url;
            link.setAttribute("download", "Reporte_Citas.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    }

    function mostrarTabla(data) {
        if(!data || data.length === 0 || !data[0]) {
            $("#tablaResultados").html(`
                <div class="info-placeholder">
                    <i class="fas fa-exclamation-circle"></i>
                    <p>No se encontraron registros.</p>
                </div>`);
            return;
        }

        let html = `
            <div class="table-actions">
                <button class="btn-blue" onclick="exportarExcel()"><i class="fas fa-file-excel"></i> Descargar Reporte</button>
                <input type="text" id="buscador" placeholder="🔎 Buscar por nombre o servicio...">
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th style="width: 25%;">Fecha y Hora</th>
                            <th>Nombre Cliente</th>
                            <th>Servicio</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoTabla">
        `;
        
        data.forEach(a => {
            if(a && a.id){
                html += `
                    <tr>
                        <td><strong>#${a.id}</strong></td>
                        <td>${a.fechaHora.replace("T", " ")}</td>
                        <td>${a.nombreCliente}</td>
                        <td>${a.servicio}</td>
                    </tr>
                `;
            }
        });
        
        html += `
                    </tbody>
                </table>
            </div>
        `;
        
        $("#tablaResultados").html(html);

        $("#buscador").on("keyup", function() {
            var value = $(this).val().toLowerCase();
            $("#cuerpoTabla tr").filter(function() {
                $(this).toggle($(this).text().toLowerCase().indexOf(value) > -1)
            });
        });
    }
</script>


</body>
</html>
